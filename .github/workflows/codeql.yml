# CodeQL — GitHub's free static analysis. Catches injection, unsafe
# deserialization, hard-coded secrets in code paths, etc. Free for
# public repos and for personal-tier private repos.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run catches new advisories applied to unchanged code.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        # `continue-on-error` because the SARIF upload requires the
        # GitHub "code scanning" feature, which is free on public repos
        # and gated behind Advanced Security on private repos. While
        # private, the analysis still runs (you can see findings in the
        # workflow logs) but the upload fails — that shouldn't break CI.
        # When the repo flips public, drop this line to make the upload
        # mandatory.
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
