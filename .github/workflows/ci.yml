# CI — runs on every PR and push to main.
#
# Security model (see DEPLOY.md "Pattern A"):
#   - This workflow uses `pull_request` (NOT `pull_request_target`), so
#     code from fork PRs is checked out but secrets are NOT exposed.
#   - GITHUB_TOKEN is scoped to read-only. PRs cannot escalate.
#   - No deployment step lives here. Deploys are in release.yml and fire
#     only on tag pushes (which only maintainers can produce).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --all-extras --dev
      - run: uv run pytest -v
