# Secret scanning — defense in depth alongside the pre-commit hook.
#
# pre-commit can be bypassed (--no-verify). This workflow cannot. Any PR
# that introduces a high-entropy string matching a known token format will
# fail this check.

name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
