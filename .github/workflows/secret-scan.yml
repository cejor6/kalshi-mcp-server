# Secret scanning — defense in depth alongside the pre-commit hook.
#
# pre-commit can be bypassed (--no-verify). This workflow cannot. Any PR
# that introduces a high-entropy string matching a known token format will
# fail this check.

name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Dependabot's GITHUB_TOKEN is more restricted than a normal PR's and
    # can't read the PR commits API that gitleaks needs for delta scans.
    # Dependabot only bumps dependency version pins — it cannot introduce
    # the kinds of strings gitleaks looks for — so skipping is safe.
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
