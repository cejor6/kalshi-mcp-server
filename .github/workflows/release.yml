# Release — builds and publishes the Docker image to GHCR.
#
# This workflow fires ONLY on tag pushes matching v*. Branch protection
# on `main` prevents non-maintainers from pushing tags via PR.
#
# That decoupling is the heart of Pattern A: production deploys never
# depend on what's on `main`. To ship a new image:
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Render (or any image-deploy target) pulls the resulting tagged image.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/kalshi-mcp-server:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/kalshi-mcp-server:${{ steps.version.outputs.version_no_v }}
            ghcr.io/${{ github.repository_owner }}/kalshi-mcp-server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      # Trigger Render to pull the newly-published `:latest` image.
      # Render's image-deploy services do NOT auto-poll GHCR on a useful
      # cadence — without this step, you'd have to click "Manual Deploy"
      # in Render's UI after every tag push. The deploy hook URL is a
      # write-only secret on the GitHub side (set in repo Settings →
      # Secrets → Actions as RENDER_DEPLOY_HOOK_URL). The URL is passed
      # only via env so GitHub's secret-masking covers any leak path.
      #
      # If RENDER_DEPLOY_HOOK_URL is unset (forkers without a Render
      # service, or running with a different host), the step skips
      # cleanly — non-Render forkers don't see a failed workflow.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not configured — skipping (no auto-redeploy)."
            exit 0
          fi
          echo "Triggering Render redeploy via deploy hook..."
          curl --fail --silent --show-error --output /dev/null \
            -X POST -H "Content-Type: application/json" \
            "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook fired successfully."

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (configured at
    # https://pypi.org/manage/project/kalshi-mcp-server/settings/publishing/)
    # uses OIDC to authenticate this workflow — no token secret needed.
    # The id-token: write permission lets the runner request an OIDC
    # token; PyPI's `pypa/gh-action-pypi-publish` action sends it and
    # PyPI verifies it matches the configured workflow.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v7.1.0
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          # `skip-existing: true` makes the step idempotent on
          # workflow_dispatch reruns — if v0.1.x is already on PyPI,
          # the step succeeds without re-uploading. Safer than letting
          # it 400 on a duplicate version.
          skip-existing: true
