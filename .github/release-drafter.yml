name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🛠 Tools / Resources"
    labels:
      - tool
      - resource
  - title: "🐛 Bug fixes"
    labels:
      - bug
      - fix
  - title: "🔐 Security"
    labels:
      - security
  - title: "📦 Dependencies"
    labels:
      - dependencies
  - title: "📚 Documentation"
    labels:
      - documentation
      - docs
  - title: "🧹 Internal"
    labels:
      - chore
      - refactor
      - ci

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - bug
      - fix
      - security
      - dependencies
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
