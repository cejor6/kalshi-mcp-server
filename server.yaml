# Same metadata as server.json, in YAML for registries that prefer it.
name: kalshi-mcp-server
version: 0.1.6
description: |
  Model Context Protocol server for Kalshi prediction markets — native
  RSA-PSS auth, token-bucket rate limiting, demo/prod safety controls.
homepage: https://github.com/cejor6/kalshi-mcp-server
license: MIT

runtimes:
  - type: python
    package: kalshi-mcp-server
    entrypoint: kalshi-mcp
    min_python: "3.11"
  - type: docker
    image: ghcr.io/cejor6/kalshi-mcp-server
    tag: latest

transports:
  - stdio
  - http

env:
  KALSHI_API_KEY_ID:
    required: true
    description: Kalshi API key ID from https://kalshi.com/account/profile
  KALSHI_PRIVATE_KEY_PATH:
    required: false
    description: Filesystem path to the RSA private key PEM file.
  KALSHI_PRIVATE_KEY_PEM:
    required: false
    description: Inline PEM contents (for hosted deploys without filesystem access).
  KALSHI_ENV:
    required: false
    default: demo
    description: "demo or prod. Defaults to demo for safety."
  KALSHI_ALLOW_PROD:
    required: false
    default: "0"
    description: Must be 1 for the server to start with KALSHI_ENV=prod.
  KALSHI_TRADING_ENABLED:
    required: false
    default: "0"
    description: Must be 1 for order-placement tools to operate. Read-only by default.
